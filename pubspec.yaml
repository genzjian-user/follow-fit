name: follow_fit
description: 跟着减 - 有氧减脂语音私教APP
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # 状态管理
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # 导航路由
  go_router: ^13.0.0

  # UI组件
  get: ^4.6.5
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0

  # 地图和定位
  flutter_map: ^6.0.0
  latlong2: ^0.8.2
  location: ^5.1.0
  geolocator: ^11.0.0

  # 蓝牙和传感器
  flutter_blue_plus: ^1.14.0
  sensors_plus: ^4.0.1

  # 语音和音频
  flutter_tts: ^3.8.3
  just_audio: ^0.9.34
  audio_session: ^0.1.11
  assets_audio_player: ^3.0.6

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.0

  # 图表和可视化
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.46

  # 网络和API
  http: ^1.1.0
  dio: ^5.4.0
  retrofit: ^4.0.1
  json_annotation: ^4.8.1

  # 权限
  permission_handler: ^11.2.0

  # 其他工具
  intl: ^0.19.0
  uuid: ^4.3.0
  collection: ^1.18.0
  pedantic: ^1.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^4.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/fonts/

  fonts:
    - family: PingFangSC
      fonts:
        - asset: assets/fonts/PingFangSC-Regular.ttf
        - asset: assets/fonts/PingFangSC-Medium.ttf
        - asset: assets/fonts/PingFangSC-Semibold.ttf